name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: stable

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build APK
        working-directory: app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: veil-android
          path: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Veil ${{ github.ref_name }}
          body: |
            ## Veil ${{ github.ref_name }}

            ### Install on Android
            1. Download `veil-android.apk` below
            2. On your Android device, enable **Settings → Install unknown apps** for your browser/Files app
            3. Open the downloaded APK and install

            ### What's in this release
            - E2E encrypted messaging (Olm/Megolm — Signal-equivalent)
            - AIM-inspired retro UI
            - Disappearing messages
            - Image, video, and file sharing
            - Group chats

            > Connects to **veilmsg.com** — create an account in-app at first launch.
          files: app/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false

  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: stable

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build web
        working-directory: app
        run: flutter build web --release

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: veil-web
          path: app/build/web/
